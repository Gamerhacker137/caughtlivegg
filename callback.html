<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OAuth Callback — CaughtLiveGG</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #0a0a14;
    color: #e8e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    line-height: 1.6;
  }
  .container { max-width: 640px; width: 100%; text-align: center; }
  .logo {
    width: 72px; height: 72px;
    margin: 0 auto 24px;
    border-radius: 18px;
    background: linear-gradient(135deg, #8b5cf6, #06b6d4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 42px;
    font-weight: 900;
    color: #fff;
    box-shadow: 0 20px 60px rgba(139, 92, 246, 0.4);
  }
  h1 {
    font-size: 32px;
    background: linear-gradient(135deg, #8b5cf6, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .subtitle { opacity: 0.7; margin-bottom: 32px; }
  .code-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    word-break: break-all;
    font-family: "SF Mono", Consolas, Monaco, monospace;
    font-size: 14px;
    text-align: left;
    max-height: 200px;
    overflow-y: auto;
  }
  .label {
    font-size: 12px;
    opacity: 0.6;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
    text-align: left;
  }
  button {
    background: linear-gradient(135deg, #8b5cf6, #06b6d4);
    color: #fff;
    border: none;
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s ease;
  }
  button:hover { transform: translateY(-2px); }
  button.copied { background: #10b981; }
  .status { margin-top: 24px; opacity: 0.6; font-size: 13px; }
  .error { color: #ef4444; }
  .success { color: #10b981; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">C</div>
  <h1>Authorization Callback</h1>
  <div class="subtitle">CaughtLiveGG OAuth flow</div>

  <div id="result">Reading parameters...</div>

  <div class="status" id="status"></div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');
  const error = params.get('error');
  const errorDescription = params.get('error_description');

  const result = document.getElementById('result');
  const status = document.getElementById('status');

  if (error) {
    result.innerHTML = `
      <div class="label">Error</div>
      <div class="code-box error">${error}${errorDescription ? '\n\n' + errorDescription : ''}</div>
    `;
    status.innerHTML = '<span class="error">✗ Authorization failed. <a href="index.html" style="color:#a78bfa">Return to home</a> and try again.</span>';
  } else if (code) {
    // Mark connection as successful for the home page pill
    try { localStorage.setItem("caughtlivegg_tiktok_connected", "1"); } catch(e) {}

    result.innerHTML = `
      <div class="label">Authorization code</div>
      <div class="code-box" id="code">${code}</div>
      <button onclick="copyCode(this)">Copy Code</button>
      ${state ? '<div class="label" style="margin-top:16px">State</div><div class="code-box">' + state + '</div>' : ''}
    `;
    status.innerHTML = '<span class="success">✓ Copy the code above and paste it into the setup script (you have ~60 seconds).</span>';
  } else {
    result.innerHTML = `
      <div class="code-box">No authorization code found in URL.</div>
    `;
    status.textContent = 'This page is the OAuth redirect target for CaughtLiveGG. It should only be visited via the TikTok authorization flow.';
  }

  function copyCode(btn) {
    navigator.clipboard.writeText(code).then(() => {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy Code';
        btn.classList.remove('copied');
      }, 2000);
    });
  }
</script>
</body>
</html>
